<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor da Estação Espacial Internacional</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        header {
            text-align: center; padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10;
            position: relative;
        }

        h1 {
            margin: 0; font-size: 1.8rem; letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(78, 205, 196, 0.8); color: #4ecdc4;
        }

        #btn-idioma {
            position: absolute; top: 15px; right: 20px;
            background: rgba(15, 32, 39, 0.8);
            color: #4ecdc4; border: 1px solid #4ecdc4;
            padding: 8px 15px; border-radius: 8px;
            font-size: 0.9rem; font-weight: bold; cursor: pointer;
            transition: all 0.3s ease;
        }
        #btn-idioma:hover { background: rgba(78, 205, 196, 0.2); }

        main { display: flex; flex: 1; position: relative; }
        #map { flex: 1; width: 100%; z-index: 1; cursor: grab; }
        #map:active { cursor: grabbing; }

        /* Container para os Botões de Topo */
        #botoes-topo {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 1000;
        }

        .btn-controlo {
            padding: 12px 20px; border-radius: 30px; border: none;
            font-size: 0.95rem; font-weight: bold; cursor: pointer; 
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        .btn-inativo { background: rgba(32, 58, 67, 0.9); color: #4ecdc4; border: 1px solid #4ecdc4; }
        .btn-inativo:hover { background: rgba(78, 205, 196, 0.2); }

        .btn-ativo {
            background: #ff6b6b; color: white; border: 1px solid #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.6);
        }

        .pulsar { animation: pulsar-anim 1.5s infinite; }

        @keyframes pulsar-anim {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 107, 107, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
        }

        #dashboard {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px;
            background: rgba(15, 32, 39, 0.75); backdrop-filter: blur(10px);
            padding: 15px 30px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6); z-index: 1000;
            flex-wrap: wrap; justify-content: center;
        }

        .stat-card { text-align: center; min-width: 110px; }
        .stat-card h3 { margin: 0; font-size: 0.8rem; color: #a8b2d1; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 1.3rem; font-weight: bold; color: #4ecdc4; }

        #prediction-panel {
            position: absolute; top: 75px; right: 20px; width: 320px;
            background: rgba(15, 32, 39, 0.9); backdrop-filter: blur(15px);
            border: 1px solid rgba(78, 205, 196, 0.4);
            border-radius: 15px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 1000;
            transition: all 0.4s ease-in-out; max-height: 75vh; overflow-y: auto;
        }
        #prediction-panel.hidden { opacity: 0; transform: translateX(120%); pointer-events: none; }

        .close-btn { position: absolute; top: 10px; right: 15px; color: #a8b2d1; font-size: 2rem; cursor: pointer; line-height: 1; }
        .close-btn:hover { color: #ff6b6b; }
        #prediction-panel h2 { margin-top: 0; font-size: 1.2rem; color: #ffffff; }
        #pred-time { font-size: 1.2rem; color: #4ecdc4; margin: 10px 0; }
        
        #countdown-container {
            background: rgba(0,0,0,0.4); border-radius: 10px; padding: 15px;
            text-align: center; margin: 15px 0; border: 1px solid rgba(255, 107, 107, 0.3);
        }
        #countdown-container h4 { margin: 0 0 5px 0; font-size: 0.9rem; color: #a8b2d1; text-transform: uppercase; }
        #countdown-display {
            font-size: 1.8rem; font-family: 'Courier New', Courier, monospace;
            font-weight: bold; color: #ff6b6b; text-shadow: 0 0 10px rgba(255, 107, 107, 0.6);
        }

        @media (max-width: 768px) {
            #botoes-topo { flex-direction: column; width: 85%; top: 10px; gap: 8px; }
            .btn-controlo { width: 100%; font-size: 0.85rem; padding: 10px; }
            #dashboard { width: 90%; padding: 10px; bottom: 10px; }
            #prediction-panel { width: 85%; top: 110px; right: 5%; left: 5%; }
            #btn-idioma { top: 60px; right: 10px; font-size: 0.8rem; padding: 5px 10px;}
        }
    </style>
</head>
<body>

    <header>
        <h1 id="main-title">Monitor e Previsão da EEI 🛰️</h1>
        <button id="btn-idioma" onclick="alternarIdioma()">🇬🇧 Mudar para Inglês</button>
    </header>

    <main>
        <div id="botoes-topo">
            <button id="btn-modo-alvo" class="btn-controlo btn-inativo" onclick="alternarModoAlvo()">
                📍 Calcular Nova Passagem (Desligado)
            </button>
            <button id="btn-trajetoria" class="btn-controlo btn-inativo" onclick="alternarTrajetoria()">
                🗺️ Mostrar Trajetória (Desligado)
            </button>
        </div>

        <div id="map"></div>

        <div id="dashboard">
            <div class="stat-card"><h3 id="lbl-lat">Latitude</h3><p id="lat">---</p></div>
            <div class="stat-card"><h3 id="lbl-lon">Longitude</h3><p id="lon">---</p></div>
            <div class="stat-card"><h3 id="lbl-alt">Altitude</h3><p id="alt">---</p></div>
            <div class="stat-card"><h3 id="lbl-vel">Velocidade</h3><p id="vel">---</p></div>
        </div>

        <div id="prediction-panel" class="hidden">
            <span class="close-btn" onclick="fecharPainel()">×</span>
            <h2 id="panel-title">Previsão de Passagem 🔭</h2>
            <p id="pred-coord" style="font-size: 0.85rem; color: #a8b2d1; margin-bottom: 5px;"></p>
            <div id="pred-time">...</div>
            
            <div id="countdown-container" class="hidden">
                <h4 id="lbl-countdown">Tempo Restante</h4>
                <div id="countdown-display">--:--:--</div>
            </div>

            <p id="pred-extra-info" style="font-size: 0.85rem;"></p>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/5.0.0/satellite.min.js"></script>
    
    <script>
        const i18n = {
            pt: {
                mudarPara: "🇬🇧 Mudar para Inglês",
                title: "Monitor e Previsão da EEI 🛰️",
                btnInativo: "📍 Calcular Nova Passagem (Desligado)",
                btnAtivo: "🎯 Seleciona um local no mapa...",
                trajInativo: "🗺️ Mostrar Trajetória (Desligado)",
                trajAtivo: "🗺️ Ocultar Trajetória (Ligado)",
                lat: "Latitude", lon: "Longitude", alt: "Altitude", vel: "Velocidade",
                predTitle: "Previsão de Passagem 🔭",
                countdownTitle: "Tempo Restante",
                calcOrbit: "A calcular órbita... ⚙️",
                passingNow: "A PASSAR AGORA! 🚀",
                target: "Alvo:", scheduled: "Agendado para",
                maxElev: "Elevação máxima no céu",
                noPass: "Nenhuma passagem encontrada.",
                noPassExtra: "A estação não passará por este ponto nos próximos 5 dias.",
                error: "Erro de conexão ao simular."
            },
            en: {
                mudarPara: "🇵🇹 Switch to Portuguese",
                title: "ISS Monitor & Prediction 🛰️",
                btnInativo: "📍 Calculate New Pass (Off)",
                btnAtivo: "🎯 Select a location on the map...",
                trajInativo: "🗺️ Show Trajectory (Off)",
                trajAtivo: "🗺️ Hide Trajectory (On)",
                lat: "Latitude", lon: "Longitude", alt: "Altitude", vel: "Velocity",
                predTitle: "Pass Prediction 🔭",
                countdownTitle: "Time Remaining",
                calcOrbit: "Calculating orbit... ⚙️",
                passingNow: "PASSING NOW! 🚀",
                target: "Target:", scheduled: "Scheduled for",
                maxElev: "Max elevation in the sky",
                noPass: "No pass found.",
                noPassExtra: "The station will not pass over this point in the next 5 days.",
                error: "Connection error during simulation."
            }
        };

        let idiomaAtual = 'pt';

        function alternarIdioma() {
            idiomaAtual = idiomaAtual === 'pt' ? 'en' : 'pt';
            atualizarTextosInterface();
        }

        function atualizarTextosInterface() {
            const txt = i18n[idiomaAtual];
            document.getElementById('btn-idioma').innerText = txt.mudarPara;
            document.getElementById('main-title').innerText = txt.title;
            document.getElementById('lbl-lat').innerText = txt.lat;
            document.getElementById('lbl-lon').innerText = txt.lon;
            document.getElementById('lbl-alt').innerText = txt.alt;
            document.getElementById('lbl-vel').innerText = txt.vel;
            document.getElementById('panel-title').innerText = txt.predTitle;
            document.getElementById('lbl-countdown').innerText = txt.countdownTitle;

            const btnAlvo = document.getElementById('btn-modo-alvo');
            btnAlvo.innerText = modoAlvoAtivo ? txt.btnAtivo : txt.btnInativo;

            const btnTraj = document.getElementById('btn-trajetoria');
            btnTraj.innerText = modoTrajetoriaAtivo ? txt.trajAtivo : txt.trajInativo;
        }

        const map = L.map('map', { zoomControl: false }).setView([0, 0], 3);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 10 }).addTo(map);

        const issIcon = L.icon({
            iconUrl: 'https://upload.wikimedia.org/wikipedia/commons/d/d0/International_Space_Station.svg',
            iconSize: [60, 40], iconAnchor: [30, 20]
        });
        
        let issMarker = L.marker([0, 0], {icon: issIcon, zIndexOffset: 1000}).addTo(map);
        let clickMarker = null; let primeiraVez = true;

        async function atualizarISSAoVivo() {
            try {
                const resposta = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const dados = await resposta.json();
                issMarker.setLatLng([dados.latitude, dados.longitude]);
                if (primeiraVez) { map.setView([dados.latitude, dados.longitude], 4); primeiraVez = false; }
                document.getElementById('lat').textContent = dados.latitude.toFixed(4) + '°';
                document.getElementById('lon').textContent = dados.longitude.toFixed(4) + '°';
                document.getElementById('alt').textContent = Math.round(dados.altitude) + ' km';
                document.getElementById('vel').textContent = Math.round(dados.velocity).toLocaleString() + ' km/h';
            } catch (erro) { console.error(erro); }
        }
        atualizarISSAoVivo(); setInterval(atualizarISSAoVivo, 3000);

        // --- MODO TRAJETÓRIA ---
        let modoTrajetoriaAtivo = false;
        let camadaTrajetoria = null;

        async function alternarTrajetoria() {
            modoTrajetoriaAtivo = !modoTrajetoriaAtivo;
            const btn = document.getElementById('btn-trajetoria');
            const txt = i18n[idiomaAtual];

            if (modoTrajetoriaAtivo) {
                btn.className = 'btn-controlo btn-ativo';
                btn.innerText = txt.trajAtivo;
                await desenharTrajetoria();
            } else {
                btn.className = 'btn-controlo btn-inativo';
                btn.innerText = txt.trajInativo;
                if (camadaTrajetoria) {
                    map.removeLayer(camadaTrajetoria);
                    camadaTrajetoria = null;
                }
            }
        }

        async function desenharTrajetoria() {
            try {
                const respostaTLE = await fetch('https://api.wheretheiss.at/v1/satellites/25544/tles');
                const dadosTLE = await respostaTLE.json();
                const satrec = satellite.twoline2satrec(dadosTLE.line1, dadosTLE.line2);
                
                let agora = new Date();
                let segmentos = [];
                let segmentoAtual = [];
                let lngAnterior = null;

                // Simula os próximos 90 minutos (aprox. 1 órbita completa)
                for(let i = 0; i <= 90; i++) {
                    let tempoTeste = new Date(agora.getTime() + i * 60000);
                    let posEVel = satellite.propagate(satrec, tempoTeste);
                    let gmst = satellite.gstime(tempoTeste);
                    let positionGd = satellite.eciToGeodetic(posEVel.position, gmst);
                    
                    let lat = satellite.degreesLat(positionGd.latitude);
                    let lng = satellite.degreesLong(positionGd.longitude);

                    // Previne que a linha cruze o mapa inteiro horizontalmente quando passa o Meridiano / Linha de Data
                    if (lngAnterior !== null && Math.abs(lng - lngAnterior) > 180) {
                        segmentos.push(segmentoAtual);
                        segmentoAtual = []; // Começa um novo traço
                    }
                    
                    segmentoAtual.push([lat, lng]);
                    lngAnterior = lng;
                }
                segmentos.push(segmentoAtual);

                if (camadaTrajetoria) map.removeLayer(camadaTrajetoria);
                
                // Desenha os segmentos no mapa com uma linha laranja tracejada
                camadaTrajetoria = L.polyline(segmentos, {
                    color: '#ff9f43',
                    weight: 3,
                    opacity: 0.8,
                    dashArray: '10, 15' // Estilo tracejado para parecer uma rota futura
                }).addTo(map);

            } catch (erro) {
                console.error("Erro ao calcular a trajetória:", erro);
            }
        }

        // --- PREVISÃO E COUNTDOWN ---
        let modoAlvoAtivo = false;
        let temporizadorCountdown = null;

        function alternarModoAlvo() {
            modoAlvoAtivo = !modoAlvoAtivo;
            const btn = document.getElementById('btn-modo-alvo');
            const mapEl = document.getElementById('map');
            if (modoAlvoAtivo) {
                btn.className = 'btn-controlo btn-ativo pulsar'; 
                btn.innerText = i18n[idiomaAtual].btnAtivo; 
                mapEl.style.cursor = 'crosshair';
            } else {
                btn.className = 'btn-controlo btn-inativo'; 
                btn.innerText = i18n[idiomaAtual].btnInativo; 
                mapEl.style.cursor = 'grab';
            }
        }

        const painel = document.getElementById('prediction-panel');
        
        function fecharPainel() {
            painel.classList.add('hidden');
            if (clickMarker) map.removeLayer(clickMarker);
            clickMarker = null; pararCountdown();
        }

        function pararCountdown() {
            if (temporizadorCountdown) clearInterval(temporizadorCountdown);
            document.getElementById('countdown-container').classList.add('hidden');
        }

        function iniciarCountdown(dataFutura) {
            pararCountdown();
            document.getElementById('countdown-container').classList.remove('hidden');
            const display = document.getElementById('countdown-display');

            temporizadorCountdown = setInterval(function() {
                const agora = new Date().getTime();
                const diferenca = dataFutura.getTime() - agora;

                if (diferenca < 0) {
                    pararCountdown();
                    document.getElementById('countdown-container').classList.remove('hidden');
                    display.innerHTML = i18n[idiomaAtual].passingNow; 
                    display.style.color = "#4ecdc4"; return;
                }

                const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
                const horas = Math.floor((diferenca % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutos = Math.floor((diferenca % (1000 * 60 * 60)) / (1000 * 60));
                const segundos = Math.floor((diferenca % (1000 * 60)) / 1000);

                let texto = "";
                if (dias > 0) texto += dias + "d ";
                texto += horas.toString().padStart(2, '0') + "h " + minutos.toString().padStart(2, '0') + "m " + segundos.toString().padStart(2, '0') + "s";
                display.innerHTML = texto;
                display.style.color = "#ff6b6b"; 
            }, 1000);
        }

        map.on('click', async function(e) {
            if (!modoAlvoAtivo) return;
            alternarModoAlvo();

            const lat = e.latlng.lat; const lng = e.latlng.lng;
            if (clickMarker) { clickMarker.setLatLng([lat, lng]); } else { clickMarker = L.marker([lat, lng]).addTo(map); }

            painel.classList.remove('hidden'); pararCountdown();
            const txt = i18n[idiomaAtual];
            
            document.getElementById('pred-coord').textContent = `${txt.target} ${lat.toFixed(4)}°, ${lng.toFixed(4)}°`;
            document.getElementById('pred-time').textContent = txt.calcOrbit;
            document.getElementById('pred-extra-info').textContent = "";

            try {
                const respostaTLE = await fetch('https://api.wheretheiss.at/v1/satellites/25544/tles');
                const dadosTLE = await respostaTLE.json();
                const satrec = satellite.twoline2satrec(dadosTLE.line1, dadosTLE.line2);
                let agora = new Date(); let proximaPassagem = null; let elevacaoMaxima = 0;

                for(let i = 0; i < 7200; i++) {
                    let tempoTeste = new Date(agora.getTime() + i * 60000);
                    let posEVel = satellite.propagate(satrec, tempoTeste);
                    let gmst = satellite.gstime(tempoTeste);
                    let positionEcf = satellite.eciToEcf(posEVel.position, gmst);
                    let observador = { longitude: lng * Math.PI / 180, latitude: lat * Math.PI / 180, height: 0 };
                    let lookAngles = satellite.ecfToLookAngles(observador, positionEcf);
                    let elevacaoGraus = lookAngles.elevation * 180 / Math.PI;

                    if (elevacaoGraus > 10) { proximaPassagem = tempoTeste; elevacaoMaxima = elevacaoGraus; break; }
                }

                if (proximaPassagem) {
                    const loc = idiomaAtual === 'pt' ? 'pt-PT' : 'en-US';
                    const dataFormatada = proximaPassagem.toLocaleDateString(loc);
                    const horaFormatada = proximaPassagem.toLocaleTimeString(loc, { hour: '2-digit', minute: '2-digit' });
                    
                    document.getElementById('pred-time').textContent = `${txt.scheduled}: ${dataFormatada} - ${horaFormatada}`;
                    document.getElementById('pred-extra-info').innerHTML = `${txt.maxElev}: <strong>${Math.round(elevacaoMaxima)}°</strong>.`;
                    iniciarCountdown(proximaPassagem);
                } else {
                    document.getElementById('pred-time').textContent = txt.noPass;
                    document.getElementById('pred-extra-info').textContent = txt.noPassExtra;
                }
            } catch (erro) {
                console.error(erro);
                document.getElementById('pred-time').textContent = txt.error;
            }
        });
    </script>
</body>
</html>
